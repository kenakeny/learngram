services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learngram-db
    environment:
      POSTGRES_USER: learngram
      POSTGRES_PASSWORD: learngram
      POSTGRES_DB: learngram
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learngram -d learngram"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
